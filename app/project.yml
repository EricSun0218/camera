# app/project.yml
name: Cue
options:
  bundleIdPrefix: com.cue
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only
    SUPPORTS_MACCATALYST: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Cue:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Cue
    info:
      path: Cue/Resources/Info.plist
      properties:
        CFBundleDisplayName: Cue
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: "Cue uses the camera to shoot photos and give real-time composition and color guidance."
        NSPhotoLibraryAddUsageDescription: "Cue saves your auto-graded photos to your photo library."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericsun.cue
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: ""    # set in Xcode
    resources:
      - path: Cue/Resources/Assets.xcassets

  CueTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: CueTests
    dependencies:
      - target: Cue
